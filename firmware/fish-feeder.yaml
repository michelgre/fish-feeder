esphome:
  name: fish-feeder
  friendly_name: Fish Feeder

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

logger:

api:

ota:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

captive_portal:

# -----------------------
# SERVO (ESPHome natif)
# -----------------------
output:
  - platform: ledc
    id: servo_pwm
    pin: GPIO2
    frequency: 50 Hz

servo:
  - id: feeder_servo
    output: servo_pwm
    min_level: 3%
    max_level: 12%

# -----------------------
# FISH FEEDER COMPONENT
# -----------------------
external_components:
  - source:
      type: local
      path: ../components

fish_feeder:
  id: feeder
  servo: feeder_servo
  open_angle: 90°
  close_angle: 0°
  open_duration: 300ms

# -----------------------
# ACTION HOME ASSISTANT
# -----------------------
button:
  - platform: template
    name: "Feed Fish"
  #  on_press:
  #    - fish_feeder.feed: feeder

  - platform: template
    name: "Reset Feed Counter"
  #  on_press:
  #    - fish_feeder.reset: feeder